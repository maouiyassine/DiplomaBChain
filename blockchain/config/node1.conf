# Besu Configuration File for Node 1

# Networking
p2p-port=30303
p2p-interface=127.0.0.1

# HTTP RPC
rpc-http-enabled=true
rpc-http-host=127.0.0.1
rpc-http-port=8545
rpc-http-api=ETH,NET,WEB3,IBFT

# WebSocket RPC
rpc-ws-enabled=true
rpc-ws-host=127.0.0.1
rpc-ws-port=8546
rpc-ws-api=ETH,NET,WEB3,IBFT

# Mining (consensus)
# IBFT2 consensus
consensus-mechanism=ibft2

# Account
miner-enabled=true
miner-coinbase=0xe2b9b6e4688fb50b9e0a0f4a4e31d3d3c2b3d4e5

# Logging
logging=INFO

# Data storage
data-path=./data

# Privacy (optional)
privacy-enabled=false

# Permissioning
permissions-accounts-contract-enabled=false
permissions-nodes-contract-enabled=false
